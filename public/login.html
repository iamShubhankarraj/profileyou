<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>profileyou — Sign In</title>
  <meta name="description" content="Sign in to profileyou — Premium Instagram DM Automation for Creators">
  <link rel="icon" type="image/png" href="/profileyou_logo.png">
  <link rel="apple-touch-icon" href="/profileyou_logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #84cc16;
      --accent-hover: #65a30d;
      --accent-dark: #059669;
      --accent-glow: rgba(132, 204, 22, 0.25);
      --bg-dark: #0a0e17;
      --bg-card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-heading: 'Plus Jakarta Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated background ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(132, 204, 22, 0.12) 0%, transparent 70%);
      top: -200px;
      right: -100px;
      animation: float1 12s ease-in-out infinite;
    }

    .bg-gradient::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(5, 150, 105, 0.1) 0%, transparent 70%);
      bottom: -150px;
      left: -100px;
      animation: float2 15s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-40px, 30px) scale(1.1); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -40px) scale(1.05); }
    }

    /* ── Grid pattern overlay ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: 
        linear-gradient(rgba(132, 204, 22, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(132, 204, 22, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ── Main card ── */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .login-card {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 
        0 0 60px rgba(132, 204, 22, 0.06),
        0 25px 50px rgba(0, 0, 0, 0.4);
      animation: cardSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardSlideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand header ── */
    .brand-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      margin: 0 auto 16px;
      box-shadow: 0 0 20px var(--accent-glow);
      transition: transform 0.3s ease;
    }

    .brand-logo:hover {
      transform: scale(1.05);
    }

    .brand-title {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 28px;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .brand-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ── Tab switcher ── */
    .tab-switcher {
      display: flex;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #0a0e17;
      box-shadow: 0 2px 8px var(--accent-glow);
    }

    .tab-btn:not(.active):hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.06);
    }

    /* ── Form elements ── */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.25s ease;
    }

    .form-input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    .form-input:focus {
      border-color: var(--accent);
      background: rgba(132, 204, 22, 0.04);
      box-shadow: 0 0 0 3px rgba(132, 204, 22, 0.1);
    }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      border: none;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 700;
      color: #0a0e17;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px var(--accent-glow);
      margin-top: 8px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(132, 204, 22, 0.35);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Error / Success messages ── */
    .message {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      display: block;
    }

    .message.success {
      background: rgba(132, 204, 22, 0.1);
      border: 1px solid rgba(132, 204, 22, 0.2);
      color: #bef264;
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer ── */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .login-footer p {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .login-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* ── Features strip ── */
    .features-strip {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 32px;
      opacity: 0.7;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .feature-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(10, 14, 23, 0.3);
      border-top-color: #0a0e17;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px;
      }
      .features-strip {
        flex-direction: column;
        gap: 8px;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="grid-overlay"></div>

  <div class="login-container">
    <div class="login-card">
      <!-- Brand Header -->
      <div class="brand-header">
        <img src="/profileyou_logo.png" alt="profileyou" class="brand-logo">
        <h1 class="brand-title">profileyou</h1>
        <p class="brand-subtitle">Premium Instagram DM Automation for Creators</p>
      </div>

      <!-- Tab Switcher -->
      <div class="tab-switcher">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- Message area -->
      <div id="message" class="message"></div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      </form>

      <!-- Signup Form (hidden by default) -->
      <form id="signup-form" style="display: none;" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="form-label" for="signup-name">Display Name</label>
          <input class="form-input" type="text" id="signup-name" placeholder="Your name" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-email">Email</label>
          <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <input class="form-input" type="password" id="signup-password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary" id="signup-btn">Create Account</button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p>By continuing, you agree to profileyou's Terms of Service.</p>
      </div>
    </div>

    <!-- Features strip -->
    <div class="features-strip">
      <div class="feature-item"><span class="feature-dot"></span> Auto-DM Replies</div>
      <div class="feature-item"><span class="feature-dot"></span> Email Capture</div>
      <div class="feature-item"><span class="feature-dot"></span> Analytics</div>
    </div>
  </div>

  <script>
    // Check if already logged in
    (async () => {
      try {
        const res = await fetch('/api/auth/me');
        if (res.ok) {
          window.location.href = '/';
        }
      } catch (e) {}
    })();

    function switchTab(tab) {
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const tabLogin = document.getElementById('tab-login');
      const tabSignup = document.getElementById('tab-signup');
      const msgEl = document.getElementById('message');

      msgEl.className = 'message';
      msgEl.textContent = '';

      if (tab === 'login') {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
        tabLogin.classList.add('active');
        tabSignup.classList.remove('active');
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
        tabSignup.classList.add('active');
        tabLogin.classList.remove('active');
      }
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = `message ${type}`;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showMessage('Welcome back! Redirecting...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 800);
        } else {
          showMessage(data.error || 'Login failed.', 'error');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (err) {
        showMessage('Network error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      const displayName = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account...';

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, displayName })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showMessage('Account created! Redirecting to dashboard...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 800);
        } else {
          showMessage(data.error || 'Signup failed.', 'error');
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      } catch (err) {
        showMessage('Network error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
